---
name: Check proto files
inputs:
  version:
    type: string
    description: Protoc version
    default: "3.5.1"
runs:
  using: composite
  steps:

    - name: Setup Protocol Buffers
      run: |
        set -euo pipefail
        curl -fsSL https://github.com/protocolbuffers/protobuf/releases/download/v${{ inputs.version }}/protoc-${{ inputs.version }}-linux-x86_64.zip -o /tmp/protoc.zip
        unzip -q -o -d /tmp /tmp/protoc.zip
        chmod +x /tmp/bin/protoc
        export PATH=/tmp/bin:$PATH
        make proto
      shell: bash

    - name: Git DIFF
      run: git diff --exit-code
      shell: bash
