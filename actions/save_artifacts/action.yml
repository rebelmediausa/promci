---
name: Save artifacts
inputs:
  directory:
    type: string
    description: Path of the directory to save
runs:
  using: composite
  steps:

    - name: Tar artifacts
      run: |
        set -euo pipefail
        uuid="$(cat /proc/sys/kernel/random/uuid | tr -d '-')"
        tar_name="artifact-${uuid}.tar"
        tar cvf "$tar_name" "${{ inputs.directory }}"
        echo "NAME=$tar_name" >> "$GITHUB_OUTPUT"
      shell: bash
      id: tar

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.tar.outputs.NAME }}
        path: artifact-*.tar
