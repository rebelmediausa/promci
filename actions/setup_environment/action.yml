---
name: Setup environment
inputs:
  enable_go:
    type: boolean
    description: Whether to enable go specific features, such as caching.
    default: true
  enable_npm:
    type: boolean
    description: Whether to enable npm specific features, such as caching.
    default: false
  enable_docker_multibuild:
    type: boolean
    description: Whether to enable multibuild docker
    default: false
  memlimit_ratio:
    type: string
    description: The ratio of memory reserved for Go
    default: "0.8"
runs:
  using: composite
  steps:

    - name: Use GO cache
      uses: actions/cache@v4
      if: inputs.enable_go == 'true'
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Use NPM cache
      uses: actions/cache@v4
      if: inputs.enable_npm == 'true'
      with:
        path: |
          ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('web/ui/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Set GOMEMLIMIT
      shell: bash
      run: |
        set -euo pipefail
        ratio="${{ inputs.memlimit_ratio }}"
        cgroup_path="$(
          awk -F: '
            $2 == "" { print $3; exit }                           # cgroup v2
            $2 ~ /(^|,)memory(,|$)/ { print $3; exit }            # cgroup v1 (memory controller)
          ' /proc/self/cgroup 2>/dev/null || true
        )"
        if [[ -z "$cgroup_path" ]]; then
          cgroup_path="/"
        fi

        # Prefer cgroup v2 limit if available.
        memory_max="/sys/fs/cgroup${cgroup_path%/}/memory.max"
        if [[ -f "$memory_max" ]]; then
          cgroup_mem_limit="$(<"$memory_max")"
          if [[ "${cgroup_mem_limit}" != "max" ]] ; then
            awk -v ratio="$ratio" -v limit="$cgroup_mem_limit" 'BEGIN {printf "GOMEMLIMIT=%.0fKiB\n", limit / 1024 * ratio}' >> "$GITHUB_ENV"
            exit 0
          fi
        fi

        # Fall back to cgroup v1 memory controller when present.
        memory_limit_in_bytes="/sys/fs/cgroup/memory${cgroup_path%/}/memory.limit_in_bytes"
        if [[ -f "$memory_limit_in_bytes" ]]; then
          cgroup_mem_limit="$(<"$memory_limit_in_bytes")"
          if [[ "$cgroup_mem_limit" =~ ^[0-9]+$ ]] && (( cgroup_mem_limit > 0 && cgroup_mem_limit < 9000000000000000000 )); then
            awk -v ratio="$ratio" -v limit="$cgroup_mem_limit" 'BEGIN {printf "GOMEMLIMIT=%.0fKiB\n", limit / 1024 * ratio}' >> "$GITHUB_ENV"
            exit 0
          fi
        fi

        awk -v ratio="$ratio" '$1 == "MemTotal:" {printf "GOMEMLIMIT=%.0fKiB\n", $2 * ratio}' /proc/meminfo >> "$GITHUB_ENV"
      if: inputs.enable_go == 'true'

    - name: Echo GOMEMLIMIT
      run: echo "GOMEMLIMIT=${GOMEMLIMIT}"
      shell: bash
      if: inputs.enable_go == 'true'

    - name: Run make promu
      run: make promu
      shell: bash
      if: inputs.enable_go == 'true'

    - name: Set up Docker QEMU
      uses: docker/setup-qemu-action@v3
      if: inputs.enable_docker_multibuild == 'true'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      if: inputs.enable_docker_multibuild == 'true'

    - name: Prepare build metadata
      run: |
        echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV
        echo "REVISION=$(git rev-parse HEAD)" >> $GITHUB_ENV
        echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
        echo "TAGS=$(git tag --points-at HEAD | paste -sd ',' -)" >> $GITHUB_ENV
