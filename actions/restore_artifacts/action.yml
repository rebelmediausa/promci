---
name: Restore artifacts
runs:
  using: composite
  steps:

    - name: Download all workflow run artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: artifact-*.tar
        merge-multiple: true
        path: .artifacts

    - name: Untar artifacts
      run: |
        set -euo pipefail
        shopt -s nullglob
        tars=(.artifacts/*.tar)
        if (( ${#tars[@]} == 0 )); then
          echo "No artifacts found in .artifacts/"
          exit 0
        fi
        for tar_file in "${tars[@]}"; do
          tar xvf "$tar_file"
        done
        rm -v -- "${tars[@]}"
      shell: bash
